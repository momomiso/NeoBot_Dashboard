name = "dashboard"
version = "0.9.0"

# repo字段
repo = "https://github.com/momomiso/NeoBot_Dashboard" 
branch = "main"

[config]
host = "0.0.0.0"

# Web控制台监听(不要与反向WebSocket服务一样)
port = 8083

# 访问token(默认留空)。
# 也可以在此显式指定一个固定值,该值会覆盖文件plugins_data/dashboard/access_token.txt里的token。
access_token = ""

# 同一个 IP 在10分钟内最多输错3次
# 超过后会临时禁止继续登录，防止公网暴力破解 Token
login_max_failures = 3
login_rate_limit_window_seconds = 600

# 日志缓冲条数
log_buffer_size = 300

# Bot信息缓存秒数
bot_info_cache_ttl = 300

# 每日消息数历史保留多少天
history_max_days = 30




